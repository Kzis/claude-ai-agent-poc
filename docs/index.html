<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AI Dev Team — Live Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--s1:#0d101a;--s2:#131720;--s3:#181d2a;--br:#232840;--brl:#2e3550;
  --t1:#e8eaf6;--t2:#8891b5;--tm:#464e6e;
  --pm:#7c6ef7;--se:#38bdf8;--qa:#34d399;
  --red:#f87171;--amber:#fbbf24;--green:#34d399;
}
html{scroll-behavior:smooth}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;line-height:1.5}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px}
header{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;background:var(--s1);border-bottom:1px solid var(--br);position:sticky;top:0;z-index:50}
.hlogo{display:flex;align-items:center;gap:12px}
.hlogo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--pm),var(--se));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px}
.hlogo h1{font-size:15px;font-weight:700;letter-spacing:-.2px}
.hlogo p{font-size:11px;color:var(--t2);margin-top:1px}
.hright{display:flex;align-items:center;gap:18px}
.live-pill{display:flex;align-items:center;gap:6px;padding:5px 12px;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25);border-radius:100px;font-size:11px;font-weight:600;color:var(--green)}
.live-dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 1.8s infinite}
.htime{font-size:11px;color:var(--tm)}
.refresh-btn{background:var(--s3);border:1px solid var(--br);color:var(--t2);padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;transition:border-color .2s,color .2s}
.refresh-btn:hover{border-color:var(--brl);color:var(--t1)}
main{max-width:1300px;margin:0 auto;padding:24px 32px}
.kpi-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.kpi{background:var(--s1);border:1px solid var(--br);border-radius:12px;padding:18px 20px}
.kpi-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--tm);margin-bottom:8px}
.kpi-val{font-size:28px;font-weight:800;letter-spacing:-1px;line-height:1}
.kpi-sub{font-size:11px;color:var(--t2);margin-top:5px}
.agents-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.agent-card{background:var(--s1);border:1px solid var(--br);border-radius:14px;overflow:hidden;transition:border-color .4s}
.agent-card.running{border-color:rgba(124,110,247,.45)}
.agent-card.completed{border-color:rgba(52,211,153,.35)}
.agent-card.failed{border-color:rgba(248,113,113,.35)}
.ac-header{padding:16px 18px 14px;border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between}
.ac-name-row{display:flex;align-items:center;gap:10px}
.ac-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.agent-card.running .ac-dot{animation:pulse 1.4s infinite}
.ac-name{font-size:14px;font-weight:700}
.ac-role{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--tm);margin-top:2px}
.status-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:3px 10px;border-radius:100px}
.sb-idle{background:rgba(70,78,110,.2);color:var(--tm);border:1px solid rgba(70,78,110,.4)}
.sb-running{background:rgba(124,110,247,.15);color:#a89cf8;border:1px solid rgba(124,110,247,.35);animation:badgePulse 2s infinite}
.sb-completed{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.3)}
.sb-failed{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.3)}
.ac-body{padding:16px 18px}
.ac-action{font-size:12px;min-height:38px;margin-bottom:14px;line-height:1.6;word-break:break-word}
.ac-action .atext{font-weight:500;color:var(--t1)}
.ac-action .aidle{color:var(--tm);font-style:italic}
.ac-metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ac-m{background:var(--s2);border:1px solid var(--br);border-radius:8px;padding:10px 12px}
.ac-m-val{font-size:18px;font-weight:700;letter-spacing:-.5px;font-variant-numeric:tabular-nums;line-height:1}
.ac-m-lbl{font-size:10px;color:var(--tm);margin-top:3px;font-weight:500;text-transform:uppercase;letter-spacing:.06em}
.ac-progress{margin-top:12px}
.ac-task{font-size:10px;color:var(--tm);margin-bottom:5px;display:flex;justify-content:space-between;gap:8px}
.ac-task span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.progress-track{background:var(--s3);border-radius:3px;height:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .6s ease}
.bottom-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:16px}
.panel{background:var(--s1);border:1px solid var(--br);border-radius:14px;overflow:hidden}
.panel-header{padding:14px 18px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--t2)}
.ph-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--tm);padding:8px 14px;border-bottom:1px solid var(--br);text-align:left}
td{padding:10px 14px;border-bottom:1px solid rgba(35,40,64,.5);font-size:12px}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.015)}
.empty-state{padding:36px;text-align:center;font-size:12px;color:var(--tm);font-style:italic}
.sum-item{padding:14px 18px;border-bottom:1px solid var(--br);display:flex;justify-content:space-between;align-items:center}
.sum-item:last-child{border-bottom:none}
.sum-label{font-size:12px;color:var(--t2)}
.sum-val{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes badgePulse{0%,100%{opacity:1}60%{opacity:.6}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:9px;height:9px;border:2px solid rgba(168,156,248,.3);border-top-color:#a89cf8;border-radius:50%;animation:spin .8s linear infinite;margin-right:5px;vertical-align:middle}
</style>
</head>
<body>

<header>
  <div class="hlogo">
    <div class="hlogo-icon">&#129302;</div>
    <div>
      <h1>AI Dev Team &mdash; Live Dashboard</h1>
      <p>PM/PO &middot; Software Engineer &middot; QA &mdash; powered by Claude Opus 4.6</p>
    </div>
  </div>
  <div class="hright">
    <div class="live-pill"><div class="live-dot"></div>LIVE</div>
    <div class="htime" id="last-updated">Connecting&hellip;</div>
    <button class="refresh-btn" onclick="fetchData()">&#8635; Refresh</button>
  </div>
</header>

<main>
  <div class="kpi-bar">
    <div class="kpi">
      <div class="kpi-label">Total Tokens Used</div>
      <div class="kpi-val" id="kpi-tokens">&#8212;</div>
      <div class="kpi-sub">input + output + thinking</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Total Cost</div>
      <div class="kpi-val" id="kpi-cost">&#8212;</div>
      <div class="kpi-sub">Claude Opus 4.6 pricing</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Running Now</div>
      <div class="kpi-val" id="kpi-active">&#8212;</div>
      <div class="kpi-sub">agents active</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Completed Runs</div>
      <div class="kpi-val" id="kpi-runs">&#8212;</div>
      <div class="kpi-sub">in history</div>
    </div>
  </div>

  <div class="agents-row" id="agents-row"></div>

  <div class="bottom-grid">
    <div class="panel">
      <div class="panel-header"><div class="ph-dot" style="background:var(--pm)"></div>Run History</div>
      <div id="history-panel"><div class="empty-state">Loading&hellip;</div></div>
    </div>
    <div class="panel">
      <div class="panel-header"><div class="ph-dot" style="background:var(--se)"></div>Session Summary</div>
      <div id="summary-panel"></div>
    </div>
  </div>
</main>

<script>
var OWNER="Kzis",REPO="claude-ai-agent-poc",FILE="docs/live.json";
var API="https://api.github.com/repos/"+OWNER+"/"+REPO+"/contents/"+FILE;
var INTERVAL=8000;
var lastEtag="";

function fmtT(n){if(!n)return"0";if(n>=1e6)return(n/1e6).toFixed(2)+"M";if(n>=1e3)return(n/1e3).toFixed(1)+"K";return String(n);}
function fmtC(u){if(!u)return"$0.0000";if(u<0.001)return"<$0.001";return"$"+u.toFixed(4);}
function fmtD(ms){if(!ms)return"&#8212;";if(ms<1000)return ms+"ms";if(ms<60000)return(ms/1000).toFixed(1)+"s";return(ms/60000).toFixed(1)+"m";}
function fmtTime(iso){if(!iso)return"&#8212;";return new Date(iso).toLocaleTimeString();}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function acolor(n){return n==="PM/PO"?"var(--pm)":n==="SE"?"var(--se)":"var(--qa)";}
function agrad(n){return n==="PM/PO"?"linear-gradient(90deg,var(--pm),#a855f7)":n==="SE"?"linear-gradient(90deg,var(--se),#818cf8)":"linear-gradient(90deg,var(--qa),#10b981)";}
function arole(n){return n==="PM/PO"?"Plan &amp; Prioritize":n==="SE"?"Build &amp; Ship":"Test &amp; Report";}

function badge(status){
  var cls="status-badge sb-"+status;
  var sp=status==="running"?'<span class="spinner"></span>':"";
  var lbl={idle:"Idle",running:"Running&hellip;",completed:"Done &#10003;",failed:"Failed &#10005;"};
  return'<span class="'+cls+'">'+sp+(lbl[status]||status)+'</span>';
}

function renderCard(name,a){
  var color=acolor(name),grad=agrad(name),st=a.status||"idle";
  var pct=Math.min(100,(a.iteration||0)/30*100);
  var action=a.currentAction
    ?'<span class="atext">'+esc(a.currentAction)+'</span>'
    :'<span class="aidle">Waiting to run&hellip;</span>';
  return'<div class="agent-card '+st+'">'
    +'<div class="ac-header">'
      +'<div class="ac-name-row">'
        +'<div class="ac-dot" style="background:'+color+'"></div>'
        +'<div><div class="ac-name" style="color:'+color+'">'+name+'</div>'
        +'<div class="ac-role">'+arole(name)+'</div></div>'
      +'</div>'+badge(st)
    +'</div>'
    +'<div class="ac-body">'
      +'<div class="ac-action">'+action+'</div>'
      +'<div class="ac-metrics">'
        +'<div class="ac-m"><div class="ac-m-val">'+fmtT(a.totalTokens)+'</div><div class="ac-m-lbl">Tokens</div></div>'
        +'<div class="ac-m"><div class="ac-m-val">'+fmtC(a.costUsd)+'</div><div class="ac-m-lbl">Cost</div></div>'
        +'<div class="ac-m"><div class="ac-m-val">'+fmtD(a.durationMs)+'</div><div class="ac-m-lbl">Duration</div></div>'
        +'<div class="ac-m"><div class="ac-m-val">'+(a.iteration||0)+'</div><div class="ac-m-lbl">Iterations</div></div>'
      +'</div>'
      +'<div class="ac-progress">'
        +'<div class="ac-task"><span>'+esc((a.taskTitle||"&#8212;").slice(0,50))+'</span>'
        +'<span>iter '+(a.iteration||0)+'/30</span></div>'
        +'<div class="progress-track"><div class="progress-fill" style="width:'+pct+'%;background:'+grad+'"></div></div>'
      +'</div>'
    +'</div>'
  +'</div>';
}

function renderHistory(hist){
  if(!hist||!hist.length)return'<div class="empty-state">No runs yet &mdash; start the orchestrator to see live data.</div>';
  var rows=hist.map(function(h){
    var res=h.status==="completed"
      ?'<span style="color:var(--green)">&#10003; Done</span>'
      :'<span style="color:var(--red)">&#10005; Failed</span>';
    return'<tr><td><span style="color:'+acolor(h.agent)+';font-weight:600">'+h.agent+'</span></td>'
      +'<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(h.taskTitle||"&#8212;")+'</td>'
      +'<td>'+res+'</td>'
      +'<td style="text-align:right;font-variant-numeric:tabular-nums">'+fmtT(h.totalTokens)+'</td>'
      +'<td style="text-align:right;font-variant-numeric:tabular-nums">'+fmtC(h.costUsd)+'</td>'
      +'<td style="color:var(--tm);font-size:11px">'+fmtTime(h.completedAt)+'</td></tr>';
  }).join("");
  return'<table><thead><tr><th>Agent</th><th>Task</th><th>Result</th>'
    +'<th style="text-align:right">Tokens</th><th style="text-align:right">Cost</th><th>Time</th>'
    +'</tr></thead><tbody>'+rows+'</tbody></table>';
}

function renderSummary(data){
  var ag=data.agents||{},hist=data.history||[];
  var vals=Object.values(ag);
  var totTok=vals.reduce(function(s,a){return s+(a.totalTokens||0);},0);
  var totCost=vals.reduce(function(s,a){return s+(a.costUsd||0);},0);
  var active=vals.filter(function(a){return a.status==="running";}).length;
  var done=hist.filter(function(h){return h.status==="completed";}).length;
  var items=[
    ["Total Tokens",fmtT(totTok)],
    ["Total Cost",fmtC(totCost)],
    ["Agents Running",active+" agent"+(active!==1?"s":"")],
    ["Completed Runs",String(done)],
    ["Data Updated",fmtTime(data.updatedAt)],
  ];
  return items.map(function(i){
    return'<div class="sum-item"><div class="sum-label">'+i[0]+'</div><div class="sum-val">'+i[1]+'</div></div>';
  }).join("");
}

function render(data){
  var ag=data.agents||{},hist=data.history||[];
  var vals=Object.values(ag);
  var totTok=vals.reduce(function(s,a){return s+(a.totalTokens||0);},0);
  var totCost=vals.reduce(function(s,a){return s+(a.costUsd||0);},0);
  var active=vals.filter(function(a){return a.status==="running";}).length;
  document.getElementById("kpi-tokens").textContent=fmtT(totTok);
  document.getElementById("kpi-cost").textContent=fmtC(totCost);
  document.getElementById("kpi-active").textContent=String(active);
  document.getElementById("kpi-runs").textContent=String(hist.length);
  document.getElementById("agents-row").innerHTML=["PM/PO","SE","QA"].map(function(n){return renderCard(n,ag[n]||{});}).join("");
  document.getElementById("history-panel").innerHTML=renderHistory(hist);
  document.getElementById("summary-panel").innerHTML=renderSummary(data);
  document.getElementById("last-updated").textContent="Updated "+new Date(data.updatedAt).toLocaleTimeString();
}

async function fetchData(){
  try{
    var headers={"Accept":"application/vnd.github.v3+json"};
    if(lastEtag)headers["If-None-Match"]=lastEtag;
    var res=await fetch(API,{headers:headers,cache:"no-store"});
    if(res.status===304)return;
    var etag=res.headers.get("ETag");
    if(etag)lastEtag=etag;
    if(!res.ok)throw new Error("GitHub API "+res.status);
    var json=await res.json();
    var data=JSON.parse(atob(json.content.replace(/\n/g,"")));
    render(data);
  }catch(err){
    document.getElementById("last-updated").textContent="Error: "+err.message;
  }
}

fetchData();
setInterval(fetchData,INTERVAL);
</script>
</body>
</html>
